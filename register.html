<!DOCTYPE html>
<html>
  <head>
    <tittle>Student Registration</tittle>
<div>
			<img src="bb.jpg"logo width="100"height="100">
			<i class="fa fa-users"></i>
		</div>
	<h2>Basoga Nseete Student's Association</h2>
	<strong><p>St.Peter's University</p>
</div>
	<form>
		<div class="input-group">
		
			<input type="text" placeholder="Full Name" required>
		</div>
		<div class="input-group">
			
			<input type="email" placeholder="Email Address" required>
		</div>
		<div class="input-group">
			
			<input type="tel" placeholder="Phone Number" required>
		</div>
		<div class="input-group">
			
			<input type="text" placeholder="District of Origin" required>
		</div>
		<div class="input-group">
		
			<input type="text" placeholder="Course" required>
		</div>
		<div class="input-group">
			<input type="text" placeholder="Responsibility" required>
		</div>

		<div class="input-group">
			<select required>
				<option value="">Year of Study</option>
				<option>Year 1</option>
				<option>Year 2</option>
				<option>Year 3</option>
				<option>Year 4</option>
				<option>Year 5</option>
			</select>
		</div>
		<button type="submit"><i class="fa fa-paper-plane"></i>Submit</button>
	</form>
</div>
</body>
</html>
