<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Basoga Nseete Registration Form</title>
	<link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
	<style>
		body{
			margin: 0;
			font-family: Arial,sans-serif;
			background: linear-gradient(to right, #e3f2fd, #ffffff);
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
		}
		.form-container {
			background: white;
			padding: 30px;
			border-radius: 15px;
			box-shadow: 0 10px 25px rgba(0, 0, 0, .0.1);
			width: 350px;
			animation: flyin 1s ease forwards ;
			transform: translateX(100px);
			opacity: 0;
		}
		@keyframes flyin {
			to {
				transform: translateX(0);
				opacity: 1;
			}
		}
		.header {
			text-align: center;
			margin-bottom: 20px;
		}
		.header p {
			margin: 0;
			font-size: 12px;
			color: blueviolet;
		}
		h2 {
			text-align: center;
			color: #od47a1;
			text-size-adjust: 30px;
		}
		.input-group {
			margin: 15px 0;
			position: relative;
		}
		.input-group i {
			position: absolute;
			top: 12px;
			left: 10px;
			color: #od47a1;
		}
		.input-group input, .input-group select {
			width: 100%;
			padding: 10px 10px 35px;
			border: 1px solid #ccc;
			border-radius: 8px;
			outline: none;
		}
		.input-group input:focus, .input-group select:focus{
			border-color: #0d47a1;
		}
		button:hover {
			background: #1565c0;
		}
	</style>
</head>
<body>
<div class="form container">
	<div class="header">
		<div>
			<img src="bb.jpg"logo width="100"height="100">
			<i class="fa fa-users"></i>
		</div>
	<h2>Basoga Nseete Student's Association</h2>
	<strong><p>St.Peter's University</p>
</div>
	<form>
		<div class="input-group">
		
			<input type="text" placeholder="Full Name" required>
		</div>
		<div class="input-group">
			
			<input type="email" placeholder="Email Address" required>
		</div>
		<div class="input-group">
			
			<input type="tel" placeholder="Phone Number" required>
		</div>
		<div class="input-group">
			
			<input type="text" placeholder="District of Origin" required>
		</div>
		<div class="input-group">
		
			<input type="text" placeholder="Course" required>
		</div>
		<div class="input-group">
			<input type="text" placeholder="Responsibility" required>
		</div>

		<div class="input-group">
			<select required>
				<option value="">Year of Study</option>
				<option>Year 1</option>
				<option>Year 2</option>
				<option>Year 3</option>
				<option>Year 4</option>
				<option>Year 5</option>
			</select>
		</div>
		<button type="submit"><i class="fa fa-paper-plane"></i>Submit</button>
	</form>
</div>
</body>
</html>
